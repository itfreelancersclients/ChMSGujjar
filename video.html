<style>
  #ifc-chat-btn {
    position: fixed;
    bottom: 24px;
    left: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #000080, #D4AF37);
    color: #fff;
    font-size: 26px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease;
  }
  #ifc-chat-btn:hover { transform: scale(1.08); }

  #ifc-chat-box {
    position: fixed;
    bottom: 96px;
    right: 24px;
    width: 320px;
    max-width: 90vw;
    height: 420px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9999;
    font-family: 'Jost', Arial, sans-serif;
  }
  #ifc-chat-header {
    background: #000080;
    color: #D4AF37;
    padding: 14px 16px;
    font-weight: 600;
    font-size: 15px;
    display: flex;

  #ifc-chat-close {

    font-size: 18px;
    background: none;
    border: none;
  }
  #ifc-chat-messages {

    overflow-y: auto;
    background: #f7f7fb;
  }
  .ifc-msg {

    line-height: 1.4;
  }
  .ifc-bot {
    background: #e8eaf6;
    color: #000080;
    border-bottom-left-radius: 2px;
  }
  .ifc-user {

    color: #fff;

  }
  #ifc-chat-input-row {
    display: flex;
    border-top: 1px solid #eee;
  }
  #ifc-chat-input {
    flex: 1;
    border: none;
    padding: 10px 12px;
    font-size: 13.5px;
    outline: none;
  }
  #ifc-chat-send {
    background: #D4AF37;
    color: #000080;
    border: none;
    padding: 0 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .ifc-quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .ifc-quick-btn {
    background: #fff;
    border: 1px solid #D4AF37;
    color: #000080;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 14px;
    cursor: pointer;
  }
  .ifc-quick-btn:hover { background: #D4AF37; color: #fff; }
</style>

<button id="ifc-chat-btn" onclick="ifcToggleChat()">💬</button>

<div id="ifc-chat-box">
  <div id="ifc-chat-header">
    <span>IFC Assistant</span>
    <button id="ifc-chat-close" onclick="ifcToggleChat()">✕</button>
  </div>
  <div id="ifc-chat-messages"></div>
  <div id="ifc-chat-input-row">
    <input id="ifc-chat-input" type="text" placeholder="Apna sawal likhein..." onkeypress="if(event.key==='Enter') ifcSend()">
    <button id="ifc-chat-send" onclick="ifcSend()">Send</button>
  </div>
</div>

<script>
// ================= IFC CHATBOT DATA (isay edit kar sakte ho) =================
const ifcKnowledge = [
  { keys: ["graphic design","logo","banner","design"], reply: "Hum Graphic Design services dete hain: logos, banners, social media creatives, aur brand identity. Portfolio page pe samples dekh sakte hain." },
  { keys: ["video","editing","reels","youtube"], reply: "Video Editing mein hum reels, YouTube videos, aur promotional content banate hain — raw footage se polished final tak." },
  { keys: ["seo","ranking","google"], reply: "SEO service mein on-page optimization, keyword research, aur Google ranking improve karne ka kaam karte hain." },
  { keys: ["digital marketing","marketing","ads","facebook ads","instagram ads"], reply: "Digital Marketing mein social media ads, campaign strategy, aur audience targeting cover hoti hy." },
  { keys: ["affiliate","affiliate marketing"], reply: "Affiliate Marketing setup aur management bhi humari services mein shamil hy — commission-based growth ke liye." },
  { keys: ["virtual assistant","va","assistant"], reply: "Virtual Assistant service mein admin tasks, scheduling, aur daily operations handle karte hain aapki business ke liye." },
  { keys: ["ecommerce","e-commerce","shopify","store","online store"], reply: "E-commerce Management mein store setup, product listing, aur order management cover hota hy." },
  { keys: ["web development","website","developer","coding"], reply: "Web Development mein hum custom websites banate hain — jaisi ye site khud bani hy! Portfolio aur about page pe details hain." },
  { keys: ["price","pricing","cost","charges","rate"], reply: "Pricing project ki requirement pe depend karti hy. Contact form fill karein ya WhatsApp/email pe reach out karein — hum quick quote de denge." },
  { keys: ["contact","email","phone","whatsapp","reach"], reply: "Aap hamein contact page ke through ya niche diye gaye contact details se reach out kar sakte hain." },
  { keys: ["hello","hi","salam","assalam"], reply: "Assalam-o-Alaikum! Main IFC Assistant hoon. Puchain — services, pricing, ya kisi bhi cheez ke baare mein." },
];

const ifcQuickReplies = ["Services", "Pricing", "Contact", "Web Development"];

function ifcFindReply(userText) {
  const text = userText.toLowerCase();
  for (const item of ifcKnowledge) {
    if (item.keys.some(k => text.includes(k))) return item.reply;
  }
  return "Maazrat, mujhe iska exact jawab nahi pata. Behtar hoga aap humari team se contact page ke zariye rabta karein — woh detail mein guide karenge.";
}

function ifcToggleChat() {
  const box = document.getElementById('ifc-chat-box');
  const isOpen = box.style.display === 'flex';
  box.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen && document.getElementById('ifc-chat-messages').children.length === 0) {
    ifcAddBotMessage("Assalam-o-Alaikum! 👋 Main IFC Assistant hoon. Aap humari services, pricing, ya contact ke baare mein pooch sakte hain.");
    ifcAddQuickReplies();
  }
}

function ifcAddMessage(text, sender) {
  const messages = document.getElementById('ifc-chat-messages');
  const div = document.createElement('div');
  div.className = 'ifc-msg ' + (sender === 'bot' ? 'ifc-bot' : 'ifc-user');
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function ifcAddBotMessage(text) { ifcAddMessage(text, 'bot'); }

function ifcAddQuickReplies() {
  const messages = document.getElementById('ifc-chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'ifc-quick-replies';
  ifcQuickReplies.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'ifc-quick-btn';
    btn.textContent = q;
    btn.onclick = () => { ifcAddMessage(q, 'user'); ifcRespond(q); };
    wrap.appendChild(btn);
  });
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function ifcRespond(userText) {
  setTimeout(() => {
    ifcAddBotMessage(ifcFindReply(userText));
  }, 400);
}

function ifcSend() {
  const input = document.getElementById('ifc-chat-input');
  const text = input.value.trim();
  if (!text) return;
  ifcAddMessage(text, 'user');
  input.value = '';
  ifcRespond(text);
}
</script>
